<!-- HEADER VISIBILE SOLO SE LOGGATA -->
<mat-toolbar color="primary" *ngIf="isLoggedIn()" class="app-toolbar">
  <div class="header-brand">
    <button type="button" class="header-logo-btn" (click)="goHome()">
      <img
        class="header-logo"
        src="logo.png"
        alt="Logo Urban Ideas"
      />
    </button>

    <span class="header-brand-title">Urban Ideas</span>
  </div>

  <span class="toolbar-spacer"></span>

  <div class="toolbar-actions">
    <button
      mat-button
      class="nav-btn"
      [routerLink]="['/users']"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      matTooltip="Utenti"
      matTooltipPosition="below"
      matTooltipShowDelay="120"
      aria-label="Utenti"
    >
      <span class="material-icons nav-icon" aria-hidden="true">groups</span>
    </button>

    <button
      mat-button
      class="nav-btn"
      [routerLink]="['/posts']"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      matTooltip="Post"
      matTooltipPosition="below"
      matTooltipShowDelay="120"
      aria-label="Post"
    >
      <span class="material-icons nav-icon" aria-hidden="true">article</span>
    </button>

    <button mat-flat-button class="logout-btn" (click)="logout()">
      Esci
    </button>
  </div>
</mat-toolbar>

<main class="app-main">
  <router-outlet></router-outlet>
</main>

<!-- FOOTER  -->
<footer class="app-footer">
  <div class="app-footer-content">
    <span class="footer-brand">Urban Ideas</span>
    <span class="footer-separator" aria-hidden="true">•</span>
    <span class="footer-copy">Progetto Angular Start2Impact • 2026</span>
  </div>
</footer>
