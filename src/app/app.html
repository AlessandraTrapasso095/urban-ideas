<!-- HEADER VISIBILE SOLO SE LOGGATA -->
<mat-toolbar color="primary" *ngIf="isLoggedIn()" class="app-toolbar">
  <!-- blocco brand in alto a sinistra dentro header -->
  <div class="header-brand">
    <button type="button" class="header-logo-btn" (click)="goHome()">
      <img
        class="header-logo"
        src="logo.png"
        alt="Logo Urban Ideas"
      />
    </button>

    <span class="header-brand-title">Urban Ideas</span>
    <!-- scritta a destra del logo -->
  </div>

  <span class="toolbar-spacer"></span>
  <!-- spacer per spingere i bottoni a destra -->

  <div class="toolbar-actions">
    <button
      mat-button
      class="nav-btn"
      [routerLink]="['/users']"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      matTooltip="Utenti"
      matTooltipPosition="below"
      matTooltipShowDelay="120"
      aria-label="Utenti"
    >
      <span class="material-icons nav-icon" aria-hidden="true">groups</span>
      <!-- solo icona: etichetta mostrata dal tooltip Material -->
    </button>

    <button
      mat-button
      class="nav-btn"
      [routerLink]="['/posts']"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      matTooltip="Post"
      matTooltipPosition="below"
      matTooltipShowDelay="120"
      aria-label="Post"
    >
      <span class="material-icons nav-icon" aria-hidden="true">article</span>
      <!-- solo icona: etichetta mostrata dal tooltip Material -->
    </button>

    <button mat-flat-button class="logout-btn" (click)="logout()">
      Esci
    </button>
  </div>
</mat-toolbar>

<!-- QUI ANGULAR CARICA LE PAGINE -->
<main class="app-main">
  <router-outlet></router-outlet>
</main>
