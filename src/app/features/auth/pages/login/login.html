<!-- pagina login: qui l'utente incolla il token GoREST -->

<section class="page-shell login-shell">
  <div class="login-wrap">
    <div class="login-brand">
      <!-- brand centrale sopra il box: logo + nome app -->
      <img class="login-logo" src="logo.png" alt="Logo Urban Ideas" />
      <p class="login-brand-name">Urban Ideas</p>
    </div>

    <div class="login-card glass-card">
      <div class="login-head">
        <h1>Accesso</h1>
        <p>
          Incolla qui il tuo token GoREST (Bearer Token) per accedere all'app.
        </p>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <!-- mat-form-field = contenitore Material per input -->
        <mat-label>Token</mat-label>

        <input
          matInput
          [formControl]="tokenControl"
          placeholder="es. 9a1b2c3d..."
          autocomplete="off"
        />

        <mat-hint>Il token viene salvato solo nel tuo browser.</mat-hint>

        <mat-error *ngIf="tokenControl.touched && tokenControl.hasError('required')">
          Il token è obbligatorio.
        </mat-error>

        <mat-error *ngIf="tokenControl.touched && tokenControl.hasError('pattern')">
          Formato token non valido.
        </mat-error>

        <mat-error *ngIf="tokenControl.touched && tokenControl.hasError('tokenFormat')">
          Token non valido: controlla di aver incollato solo il token.
        </mat-error>
      </mat-form-field>

      <button
        mat-raised-button
        class="login-btn"
        type="button"
        (click)="login()"
        [disabled]="tokenControl.invalid"
      >
        Entra
      </button>
    </div>
  </div>
</section>
