<!-- pagina lista utenti -->

<h1>Utenti</h1>

<p *ngIf="isLoading">
  Caricamento utenti...
</p>
<!-- loading -->

<p *ngIf="!isLoading && errorMessage">
  {{ errorMessage }}
</p>
<!-- errore -->

<p *ngIf="!isLoading && !errorMessage && dataSource.data.length === 0">
  Nessun utente trovato.
</p>
<!-- stato lista vuota -->

<!-- barra ricerca utenti -->
<div class="users-toolbar">
  <mat-form-field appearance="outline">
    <mat-label>Cerca</mat-label>
    <input
      matInput
      placeholder="Scrivi nome o email"
      [(ngModel)]="searchText"
    />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Campo</mat-label>
    <mat-select [(ngModel)]="searchField">
      <mat-option value="name">Nome</mat-option>
      <!-- cerco per nome -->
      <mat-option value="email">Email</mat-option>
      <!-- cerco per email -->
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <!-- select per scegliere quanti risultati -->
    <mat-label>Risultati</mat-label>
    <mat-select [(ngModel)]="perPage" (selectionChange)="onPerPageChange()">
      <mat-option [value]="10">10</mat-option>
      <mat-option [value]="20">20</mat-option>
      <mat-option [value]="50">50</mat-option>
    </mat-select>
  </mat-form-field>

  <button
    mat-raised-button
    (click)="page=1; applySearch()"
  >
    Cerca
  </button>
  <!-- click chiama applySearch() che decide se fare lista o ricerca -->

  <button
    mat-button
    (click)="resetFilters()"
  >
    Reset
  </button>
  <!-- reset: rimetto i default e ricarico la lista -->

  <button
    mat-flat-button
    color="primary"
    type="button"
    (click)="openCreateUserDialog()"
  >
    Nuovo utente
  </button>
  <!-- apro la finestra modale per creare un nuovo utente -->
</div>

<!-- paginazione -->
<div class="users-pagination">
  <button mat-button (click)="goPrev()" [disabled]="isLoading || page <= 1">
    Prev
  </button>

  <span>Pagina {{ page }} / {{ pages }} (Totale: {{ total }})</span>

  <button mat-button (click)="goNext()" [disabled]="isLoading || page >= pages">
    Next
  </button>
</div>

<table mat-table [dataSource]="dataSource">
  <!-- tabella material: uso dataSource (MatTableDataSource) -->

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let user">{{ user.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let user">{{ user.name }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let user">{{ user.email }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let user">{{ user.status }}</td>
  </ng-container>

<ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef>Azioni</th>
  <td mat-cell *matCellDef="let user">
    <button
  mat-button
  type="button"
  (click)="openEditUserDialog(user)"
>
  Modifica
</button>

<button
  mat-button
  color="warn"
  type="button"
  (click)="requestDelete(user)"
>
  Elimina
</button>

  </td>
</ng-container>

 <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
 <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
