<!-- pagina lista utenti -->

<section class="page-shell users-page">
  <div class="glass-card users-card">
    <header class="users-header">
      <h1>Utenti</h1>
      <p>Gestisci anagrafica, ricerca e operazioni rapide sugli utenti.</p>
    </header>

    <div *ngIf="isLoading" class="loading-wrap">
      <span class="ui-spinner" aria-hidden="true"></span>
    </div>
    <!-- spinner caricamento utenti -->
    <!-- loading -->

    <p *ngIf="!isLoading && errorMessage" class="status-msg error">
      {{ errorMessage }}
    </p>
    <!-- errore -->

    <p *ngIf="!isLoading && !errorMessage && dataSource.data.length === 0" class="status-msg empty">
      Nessun utente trovato.
    </p>
    <!-- stato lista vuota -->

    <!-- barra ricerca utenti -->
    <div class="users-toolbar">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Cerca</mat-label>
        <input matInput placeholder="Scrivi nome o email" [(ngModel)]="searchText" />
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Campo</mat-label>
        <mat-select [(ngModel)]="searchField">
          <mat-option value="name">Nome</mat-option>
          <mat-option value="email">Email</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Risultati</mat-label>
        <mat-select [(ngModel)]="perPage" (selectionChange)="onPerPageChange()">
          <mat-option [value]="10">10</mat-option>
          <mat-option [value]="20">20</mat-option>
          <mat-option [value]="50">50</mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-raised-button class="btn-search" (click)="page=1; applySearch()">
        Cerca
      </button>

      <button mat-button class="btn-reset" (click)="resetFilters()">
        Reset
      </button>

      <button mat-flat-button class="btn-create" type="button" (click)="openCreateUserDialog()">
        Nuovo utente
      </button>
    </div>

    <!-- paginazione -->
    <div class="users-pagination">
      <button mat-button (click)="goPrev()" [disabled]="isLoading || page <= 1">Prev</button>

      <span>Pagina {{ page }} / {{ pages }} (Totale: {{ total }})</span>

      <button mat-button (click)="goNext()" [disabled]="isLoading || page >= pages">Next</button>
    </div>

    <div class="table-wrap">
      <table mat-table [dataSource]="dataSource" class="users-table">
        <!-- tabella material: uso dataSource (MatTableDataSource) -->

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let user">{{ user.id }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let user">
            <button mat-button class="name-link" type="button" (click)="goToDetail(user)">
              {{ user.name }}
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="status-header">Status</th>
          <td mat-cell *matCellDef="let user" class="status-cell">
            <span
              class="status-dot"
              [class.is-active]="user.status === 'active'"
              [class.is-inactive]="user.status !== 'active'"
              [matTooltip]="statusLabel(user.status)"
              matTooltipPosition="above"
              matTooltipShowDelay="120"
              [attr.aria-label]="statusLabel(user.status)"
            ></span>
            <!-- tooltip Material in overlay: non si taglia dentro la tabella -->
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Azioni</th>
          <td mat-cell *matCellDef="let user" class="actions-cell">
            <button mat-button type="button" (click)="openEditUserDialog(user)">Modifica</button>

            <button mat-button color="warn" type="button" (click)="requestDelete(user)">
              Elimina
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  </div>
</section>
