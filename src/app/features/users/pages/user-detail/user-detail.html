<!-- pagina dettaglio utente -->

<section class="page-shell user-detail-page">
  <div class="glass-card detail-card">
    <h1>Dettaglio utente</h1>

    <div *ngIf="isLoading" class="loading-wrap">
      <span class="ui-spinner" aria-hidden="true"></span>
    </div>
    <!-- spinner caricamento utente -->
    <!-- loading -->

    <p *ngIf="!isLoading && errorMessage" class="status-msg error">
      {{ errorMessage }}
    </p>
    <!-- errore -->

    <div *ngIf="!isLoading && !errorMessage && user" class="user-data">
      <p><strong>ID:</strong> {{ user.id }}</p>
      <p><strong>Nome:</strong> {{ user.name }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <p><strong>Gender:</strong> {{ user.gender }}</p>
      <p class="status-line">
        <strong>Status:</strong>
        <span
          class="status-dot"
          [class.is-active]="user.status === 'active'"
          [class.is-inactive]="user.status !== 'active'"
          [matTooltip]="statusLabel(user.status)"
          matTooltipPosition="above"
          matTooltipShowDelay="120"
          [attr.aria-label]="statusLabel(user.status)"
        ></span>
        <!-- tooltip Material in overlay: stile coerente con la lista utenti -->
      </p>
    </div>

    <p *ngIf="!isLoading && !errorMessage && !user" class="status-msg empty">
      Nessun dato utente disponibile.
    </p>
  </div>

  <div class="glass-card posts-card">
    <h2>Post dell'utente</h2>

    <div *ngIf="postsLoading" class="loading-wrap">
      <span class="ui-spinner" aria-hidden="true"></span>
    </div>
    <!-- spinner caricamento post utente -->

    <p *ngIf="!postsLoading && postsError" class="status-msg error">
      {{ postsError }}
    </p>

    <p *ngIf="!postsLoading && !postsError && posts.length === 0" class="status-msg empty">
      Nessun post trovato.
    </p>

    <div *ngIf="!postsLoading && !postsError && posts.length > 0" class="post-list">
      <article *ngFor="let post of posts" class="post-box">
        <p><strong>Titolo:</strong> {{ post.title }}</p>
        <p><strong>Testo:</strong> {{ post.body }}</p>

        <app-post-comments [postId]="post.id"></app-post-comments>
      </article>
    </div>
  </div>
</section>
