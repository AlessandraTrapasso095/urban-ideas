<h2 mat-dialog-title class="dialog-title">{{ title }}</h2>
<!-- titolo del dialog -->

<div mat-dialog-content class="dialog-content">
  <!-- contenuto principale del dialog -->

  <p class="dialog-subtitle">
    Inserisci i dati dell'utente e salva per aggiornare subito la lista.
  </p>
  <!-- sottotitolo descrittivo coerente con lo stile delle card -->

  <form [formGroup]="form" class="form">
    <!-- collego questo form al reactive form definito in TypeScript -->

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" />
      <!-- formControlName collega l'input al controllo 'name' del form -->

      <mat-error *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')">
        Il nome è obbligatorio
      </mat-error>
      <!-- errore se required -->

      <mat-error *ngIf="form.get('name')?.touched && form.get('name')?.hasError('minlength')">
        Minimo 2 caratteri
      </mat-error>
      <!-- errore se troppo corto -->
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
      <!-- collego l'input al controllo 'email' -->

      <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
        L'email è obbligatoria
      </mat-error>

      <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
        Inserisci un'email valida
      </mat-error>
    </mat-form-field>

    <div class="grid-two">
      <!-- metto le select in 2 colonne su desktop per una finestra più ordinata -->

      <mat-form-field appearance="outline" class="half">
        <mat-label>Genere</mat-label>
        <mat-select formControlName="gender">
          <!-- collego la select al controllo 'gender' -->

          <mat-option *ngFor="let g of genders" [value]="g">
            {{ g }}
          </mat-option>
          <!-- genero le opzioni -->
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <!-- collego la select al controllo 'status' -->

          <mat-option *ngFor="let s of statuses" [value]="s">
            {{ s }}
          </mat-option>
          <!-- genero le opzioni -->
        </mat-select>
      </mat-form-field>
    </div>

    <p *ngIf="errorMessage" class="error">
     {{ errorMessage }}
    </p>
    <!-- mostro l'errore se la POST fallisce -->
  </form>
</div>

<div mat-dialog-actions align="end" class="dialog-actions">
  <!-- area bottoni -->

  <button mat-button class="btn-cancel" type="button" (click)="cancel()" [disabled]="isSubmitting">
   Annulla
  </button>
  <!-- disabilito annulla durante invio, per evitare stati strani -->

  <button
    mat-flat-button
    class="btn-confirm"
    type="button"
    (click)="submit()"
    [disabled]="isSubmitting || form.invalid"
  >
    {{ isSubmitting ? 'Invio...' : submitLabel }}
  </button>
  <!-- testo dinamico per far capire che sta inviando -->
</div>
