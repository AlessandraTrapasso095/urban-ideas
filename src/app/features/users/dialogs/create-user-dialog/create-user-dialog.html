<!-- dialog utente: stesso template usato per creazione e modifica -->
<h2 mat-dialog-title class="ui-dialog-title">{{ title }}</h2>

<div mat-dialog-content class="ui-dialog-content ui-dialog-content-lg">

  <p class="ui-dialog-subtitle">
    Inserisci i dati dell'utente e salva per aggiornare subito la lista.
  </p>
  <!-- uso classe dialog condivisa tra create-user e create-post -->

  <form [formGroup]="form" class="ui-dialog-form">

    <mat-form-field appearance="outline" class="ui-dialog-field-full">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" />
      <!-- collega l'input al controllo 'name' del form -->

      <mat-error *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')">
        Il nome è obbligatorio
      </mat-error>
      <!-- errore se required -->

      <mat-error *ngIf="form.get('name')?.touched && form.get('name')?.hasError('minlength')">
        Minimo 2 caratteri
      </mat-error>
      <!-- errore se troppo corto -->
    </mat-form-field>

    <mat-form-field appearance="outline" class="ui-dialog-field-full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" />
      <!-- collego l'input al controllo 'email' -->

      <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
        L'email è obbligatoria
      </mat-error>

      <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
        Inserisci un'email valida
      </mat-error>
    </mat-form-field>

    <div class="ui-dialog-grid-two">

      <mat-form-field appearance="outline" class="ui-dialog-field-half">
        <mat-label>Genere</mat-label>
        <mat-select formControlName="gender">
          <!-- collego la select al controllo 'gender' -->

          <mat-option *ngFor="let g of genders" [value]="g">
            {{ g }}
          </mat-option>
          <!-- genero le opzioni -->
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="ui-dialog-field-half">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <!-- collego la select al controllo 'status' -->

          <mat-option *ngFor="let s of statuses" [value]="s">
            {{ s }}
          </mat-option>
          <!-- genero le opzioni -->
        </mat-select>
      </mat-form-field>
    </div>

    <p *ngIf="errorMessage" class="ui-dialog-error">
     {{ errorMessage }}
    </p>
    <!-- mostro l'errore se POST fallisce -->
  </form>
</div>

<div mat-dialog-actions align="end" class="ui-dialog-actions">
  <!-- area bottoni -->

  <button mat-button class="ui-dialog-btn-cancel" type="button" (click)="cancel()" [disabled]="isSubmitting">
   Annulla
  </button>
  <!-- disabilito annulla durante invio -->

  <button
    mat-flat-button
    class="ui-dialog-btn-confirm"
    type="button"
    (click)="submit()"
    [disabled]="isSubmitting || form.invalid"
  >
    {{ isSubmitting ? 'Invio...' : submitLabel }}
  </button>
</div>
