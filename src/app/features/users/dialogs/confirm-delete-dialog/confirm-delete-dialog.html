<!-- dialog conferma eliminazione -->

<h2 mat-dialog-title>Conferma eliminazione</h2>
<!-- titolo del dialog -->

<div mat-dialog-content class="confirm-content">
  <!-- contenuto -->

  <p>
    Vuoi davvero eliminare questo utente
    <strong *ngIf="data.name">{{ data.name }}</strong
    ><span *ngIf="!data.name">?</span>
  </p>
  <!-- mostro il nome se lo ho -->
</div>

<div mat-dialog-actions align="end" class="confirm-actions">
  <!-- area bottoni -->

  <button mat-button type="button" (click)="cancel()">
    Annulla
  </button>
  <!-- chiudo via codice -->

  <button mat-flat-button class="btn-delete" type="button" (click)="confirm()">
    Elimina
  </button>
  <!-- chiudo via codice -->
</div>
