<h2 mat-dialog-title>Conferma eliminazione</h2>
<!-- titolo del dialog -->

<div mat-dialog-content>
  <!-- contenuto -->

  <p>
    Vuoi davvero eliminare questo utente
    <strong *ngIf="data?.name">{{ data.name }}</strong
    ><span *ngIf="!data?.name">?</span>
  </p>
  <!-- mostro il nome se lo ho -->
</div>

<div mat-dialog-actions align="end">
  <!-- area bottoni -->

  <button mat-button type="button" (click)="cancel()">
    Annulla
  </button>
  <!-- chiudo via codice -->

  <button mat-flat-button color="warn" type="button" (click)="confirm()">
    Elimina
  </button>
  <!-- chiudo via codice -->
</div>
