<!-- componente commenti per un singolo post -->

<button type="button" (click)="toggle()">
  {{ isOpen ? 'Nascondi commenti' : 'Mostra commenti' }}
</button>
<!-- toggle apertura commenti -->

<div *ngIf="isOpen" style="margin-top: 10px;">
  <p *ngIf="isLoading">
    Caricamento commenti...
  </p>
  <!-- loading -->

  <p *ngIf="!isLoading && errorMessage">
    {{ errorMessage }}
  </p>
  <!-- errore -->

  <p *ngIf="!isLoading && !errorMessage && comments.length === 0">
    Nessun commento.
  </p>
  <!-- empty state -->

  <div *ngIf="!isLoading && !errorMessage && comments.length > 0">
    <div *ngFor="let c of comments">
      <p><strong>{{ c.name }}</strong> ({{ c.email }})</p>
      <p>{{ c.body }}</p>
      <hr />
    </div>
  </div>
  <!-- lista commenti -->

  <hr />

  <h3>Aggiungi un commento</h3>

  <p *ngIf="submitError">
    {{ submitError }}
  </p>
  <!-- errore invio -->

  <div style="display: flex; flex-direction: column; gap: 8px; max-width: 420px;">
    <input
      type="text"
      placeholder="Nome"
      [(ngModel)]="draft.name"
      name="name-{{ postId }}"
    />

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="draft.email"
      name="email-{{ postId }}"
    />

    <textarea
      rows="3"
      placeholder="Scrivi il commento..."
      [(ngModel)]="draft.body"
      name="body-{{ postId }}"
    ></textarea>

    <button
      type="button"
      (click)="submit()"
      [disabled]="isSubmitting"
    >
      {{ isSubmitting ? 'Invio...' : 'Invia commento' }}
    </button>
  </div>
  <!-- form commento -->
</div>
