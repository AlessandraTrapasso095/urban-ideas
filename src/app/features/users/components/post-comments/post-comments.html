<p *ngIf="isLoading">Caricamento commenti...</p>

<p *ngIf="!isLoading && errorMessage">
  {{ errorMessage }}
</p>

<p *ngIf="!isLoading && !errorMessage && comments.length === 0">
  Nessun commento.
</p>

<div *ngIf="!isLoading && !errorMessage && comments.length > 0">
  <div *ngFor="let c of comments; trackBy: trackByCommentId">
    <p><strong>{{ c.name }}</strong> ({{ c.email }})</p>
    <p>{{ c.body }}</p>
    <hr />
  </div>
</div>

<hr />

<h3>Aggiungi un commento</h3>

<p *ngIf="submitError">{{ submitError }}</p>

<div style="display: flex; flex-direction: column; gap: 8px; max-width: 420px;">
  <input type="text" placeholder="Nome" [(ngModel)]="draft.name" />
  <input type="email" placeholder="Email" [(ngModel)]="draft.email" />
  <textarea rows="3" placeholder="Scrivi il commento..." [(ngModel)]="draft.body"></textarea>

  <button type="button" (click)="submit()" [disabled]="isSubmitting">
    {{ isSubmitting ? 'Invio...' : 'Invia commento' }}
  </button>
</div>
