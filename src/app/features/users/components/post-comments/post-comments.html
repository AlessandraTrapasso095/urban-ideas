<!-- componente commenti per un singolo post -->

<section class="comments-shell">
  <div *ngIf="isLoading" class="loading-wrap">
    <span class="ui-spinner" aria-hidden="true"></span>
  </div>
  <!-- spinner caricamento commenti -->

  <p *ngIf="!isLoading && errorMessage" class="status-msg error">
    {{ errorMessage }}
  </p>

  <p *ngIf="!isLoading && !errorMessage && comments.length === 0" class="status-msg empty">
    Nessun commento.
  </p>

  <div *ngIf="!isLoading && !errorMessage && comments.length > 0" class="comment-list">
    <article *ngFor="let c of comments; trackBy: trackByCommentId" class="comment-item">
      <p class="comment-author">
        <strong>{{ c.name }}</strong>
        <span>{{ c.email }}</span>
      </p>
      <p class="comment-body">{{ c.body }}</p>
    </article>
  </div>

  <div class="comment-form-wrap">
    <h3>Aggiungi un commento</h3>

    <p *ngIf="submitError" class="status-msg error">{{ submitError }}</p>

    <div class="comment-form">
      <input
        type="text"
        placeholder="Nome"
        [(ngModel)]="draft.name"
        name="name-{{ postId }}"
      />

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="draft.email"
        name="email-{{ postId }}"
      />

      <textarea
        rows="3"
        placeholder="Scrivi il commento..."
        [(ngModel)]="draft.body"
        name="body-{{ postId }}"
      ></textarea>

      <button type="button" (click)="submit()" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Invio...' : 'Invia commento' }}
      </button>
    </div>
  </div>
</section>
