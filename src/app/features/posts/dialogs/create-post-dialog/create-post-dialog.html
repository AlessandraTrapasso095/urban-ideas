<!-- dialog creazione post -->

<h2 mat-dialog-title>{{ 'Nuovo post' }}</h2>

<div mat-dialog-content class="dialog-content">
  <form [formGroup]="form" class="form">
    <!-- form reattivo collegato a create-post-dialog.ts -->

    <mat-form-field appearance="outline" class="full">
      <mat-label>User ID</mat-label>
      <input matInput type="number" formControlName="user_id" />

      <mat-error *ngIf="form.get('user_id')?.touched && form.get('user_id')?.hasError('required')">
        User ID obbligatorio
      </mat-error>

      <mat-error *ngIf="form.get('user_id')?.touched && form.get('user_id')?.hasError('min')">
        User ID deve essere maggiore di 0
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Titolo</mat-label>
      <input matInput formControlName="title" />

      <mat-error *ngIf="form.get('title')?.touched && form.get('title')?.hasError('required')">
        Il titolo è obbligatorio
      </mat-error>

      <mat-error *ngIf="form.get('title')?.touched && form.get('title')?.hasError('minlength')">
        Minimo 3 caratteri
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Testo</mat-label>
      <textarea matInput rows="4" formControlName="body"></textarea>

      <mat-error *ngIf="form.get('body')?.touched && form.get('body')?.hasError('required')">
        Il testo è obbligatorio
      </mat-error>

      <mat-error *ngIf="form.get('body')?.touched && form.get('body')?.hasError('minlength')">
        Minimo 3 caratteri
      </mat-error>
    </mat-form-field>

    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>
    <!-- errore server se POST fallisce -->
  </form>
</div>

<div mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button type="button" (click)="cancel()" [disabled]="isSubmitting">
    Annulla
  </button>

  <button
    mat-flat-button
    class="btn-confirm"
    type="button"
    (click)="submit()"
    [disabled]="isSubmitting || form.invalid"
  >
    {{ isSubmitting ? 'Invio...' : 'Crea' }}
  </button>
</div>
