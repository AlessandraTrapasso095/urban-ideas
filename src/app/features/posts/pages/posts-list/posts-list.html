<h1>Posts</h1>

<!-- LOADING -->
<div *ngIf="isLoading">
  Caricamento post...
</div>

<!-- ERRORE -->
<div *ngIf="!isLoading && errorMessage">
  {{ errorMessage }}
</div>

<!-- EMPTY STATE -->
<div *ngIf="!isLoading && !errorMessage && posts.length === 0">
  Nessun post trovato.
</div>

<!-- LISTA -->
<div *ngIf="!isLoading && !errorMessage && posts.length > 0">
  <div style="margin: 12px 0;">
    <button (click)="goPrev()">Prev</button>
    <span style="margin: 0 10px;">
      Pagina {{ page }} / {{ pages }} (Totale: {{ total }})
    </span>
    <button (click)="goNext()">Next</button>
  </div>

  <table border="1" cellpadding="8" cellspacing="0" width="100%">
    <thead>
      <tr>
        <th>ID</th>
        <th>User</th>
        <th>Titolo</th>
        <th>Azioni</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let post of posts">
        <td>{{ post.id }}</td>
        <td>{{ post.user_id }}</td>
        <td>{{ post.title }}</td>
        <td>
          <button (click)="toggleComments(post.id)">
            {{ isExpanded(post.id) ? 'Nascondi commenti' : 'Mostra commenti' }}
          </button>
        </td>
      </tr>

      <!-- qui sotto (step successivo) potremo mostrare i commenti davvero -->
    </tbody>
  </table>
</div>
